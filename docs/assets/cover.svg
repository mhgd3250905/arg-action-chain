<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ARG Action Chain</title>
  <desc id="desc">A visual cover showing an agent moving through locked step contracts with validation gates.</desc>
  <rect width="1280" height="640" fill="#0E1116"/>
  <rect x="48" y="48" width="1184" height="544" rx="24" fill="#151A22" stroke="#2E3645"/>
  <circle cx="1104" cy="132" r="72" fill="#2E6F95" opacity="0.22"/>
  <circle cx="190" cy="496" r="92" fill="#D6A84F" opacity="0.18"/>
  <path d="M156 369C253 284 347 253 438 277C537 303 601 385 705 363C812 341 867 226 988 225C1039 225 1088 245 1135 284" stroke="#2E3645" stroke-width="3" stroke-dasharray="8 12"/>
  <text x="96" y="142" fill="#F5F1E8" font-family="Segoe UI, Arial, sans-serif" font-size="58" font-weight="800">ARG Action Chain</text>
  <text x="99" y="192" fill="#C7CEDB" font-family="Segoe UI, Arial, sans-serif" font-size="24">Step Contract based execution pattern for LLM Agents</text>
  <text x="99" y="236" fill="#8FA1B8" font-family="Segoe UI, Arial, sans-serif" font-size="19">limit drift · reduce hallucination · block self-verification</text>

  <g transform="translate(103 306)">
    <rect width="220" height="146" rx="14" fill="#1F2632" stroke="#5F718A"/>
    <text x="24" y="42" fill="#F5F1E8" font-family="Segoe UI, Arial, sans-serif" font-size="23" font-weight="700">Step 01</text>
    <text x="24" y="76" fill="#9FB0C6" font-family="Segoe UI, Arial, sans-serif" font-size="16">read current card</text>
    <rect x="24" y="102" width="88" height="12" rx="6" fill="#D6A84F"/>
    <rect x="24" y="124" width="144" height="12" rx="6" fill="#394556"/>
  </g>

  <g transform="translate(386 306)">
    <rect width="220" height="146" rx="14" fill="#1F2632" stroke="#5F718A"/>
    <text x="24" y="42" fill="#F5F1E8" font-family="Segoe UI, Arial, sans-serif" font-size="23" font-weight="700">Step 02</text>
    <text x="24" y="76" fill="#9FB0C6" font-family="Segoe UI, Arial, sans-serif" font-size="16">fill bounded fields</text>
    <rect x="24" y="102" width="128" height="12" rx="6" fill="#2E6F95"/>
    <rect x="24" y="124" width="168" height="12" rx="6" fill="#394556"/>
  </g>

  <g transform="translate(669 306)">
    <rect width="220" height="146" rx="14" fill="#1F2632" stroke="#5F718A"/>
    <text x="24" y="42" fill="#F5F1E8" font-family="Segoe UI, Arial, sans-serif" font-size="23" font-weight="700">Validate</text>
    <text x="24" y="76" fill="#9FB0C6" font-family="Segoe UI, Arial, sans-serif" font-size="16">exit code decides</text>
    <path d="M31 116L58 137L104 91" stroke="#6BCB9B" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g transform="translate(952 306)">
    <rect width="220" height="146" rx="14" fill="#1F2632" stroke="#5F718A"/>
    <text x="24" y="42" fill="#F5F1E8" font-family="Segoe UI, Arial, sans-serif" font-size="23" font-weight="700">Next Card</text>
    <text x="24" y="76" fill="#9FB0C6" font-family="Segoe UI, Arial, sans-serif" font-size="16">unlock only after PASS</text>
    <rect x="24" y="104" width="172" height="36" rx="18" fill="#263241" stroke="#D6A84F"/>
    <text x="50" y="128" fill="#F5F1E8" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">TERMINAL?</text>
  </g>

  <path d="M333 379H370" stroke="#D6A84F" stroke-width="5" stroke-linecap="round"/>
  <path d="M616 379H653" stroke="#D6A84F" stroke-width="5" stroke-linecap="round"/>
  <path d="M899 379H936" stroke="#D6A84F" stroke-width="5" stroke-linecap="round"/>
  <path d="M365 367L379 379L365 391" stroke="#D6A84F" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M648 367L662 379L648 391" stroke="#D6A84F" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M931 367L945 379L931 391" stroke="#D6A84F" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="99" y="540" fill="#C7CEDB" font-family="Segoe UI, Arial, sans-serif" font-size="18">Agent is the player, not the puzzle designer. Validation is the gate, not a suggestion.</text>
</svg>

